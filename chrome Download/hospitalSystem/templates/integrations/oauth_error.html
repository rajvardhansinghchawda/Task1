<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Error - Hospital HMS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #dc2626; margin-bottom: 1rem; }
        .error-icon { font-size: 3rem; margin-bottom: 1rem; }
        .error-message { color: #4b5563; margin-bottom: 1.5rem; padding: 1rem; background-color: #fef2f2; border-radius: 4px; border: 1px solid #fee2e2; word-break: break-word; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-secondary { background-color: #6b7280; color: white; margin-left: 0.5rem; }
        .btn-secondary:hover { background-color: #4b5563; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">⚠️</div>
        <h2>Google Calendar Connection Failed</h2>
        <div class="error-message">
            <p><strong>Error:</strong> {{ error }}</p>
        </div>
        <p style="color: #6b7280; margin-bottom: 1.5rem;">This could be due to an expired token or a misconfigured OAuth setup. Please try again.</p>
        <div>
            <a href="{% url 'google_calendar_init' %}" class="btn btn-primary">Try Again</a>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
