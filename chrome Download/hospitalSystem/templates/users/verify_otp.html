<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Hospital HMS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 2rem 0;}
        .container { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #4b5563; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; text-align: center; font-size: 1.25rem; letter-spacing: 2px;}
        button { width: 100%; padding: 0.75rem; background-color: #10b981; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #059669; }
        .errorlist { color: #ef4444; font-size: 0.875rem; padding-left: 1rem; margin-top: 0.5rem;}
        .links { margin-top: 1rem; text-align: center; font-size: 0.875rem;}
        .links a { color: #10b981; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter Verification Code</h2>
        <p class="subtitle">We've sent a 6-digit code to {{ request.session.signup_email }}</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {{ form.otp }}
                {% if form.otp.errors %}
                <ul class="errorlist">
                    {% for error in form.otp.errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            <button type="submit">Verify Code</button>
        </form>
        
        <div class="links">
            <p>Didn't receive it? <a href="{% url 'email_signup' %}">Go back and try again</a></p>
        </div>
    </div>
</body>
</html>
